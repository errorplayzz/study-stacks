<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY STACKS - Login</title>
    <link rel="stylesheet" href="./login.css">

</head>
<body>
    <div class="header">
        <header>
            <h1 class="heading">Study Stacks</h1>
            <h3 class="title">“e-Learning doesn't just "happen"! It requires careful planning and implementation.”</h3>
        </header>
        <div class="backbutton">
            <a href="../index.html">
                <i class="fa-solid fa-xmark"></i>
            </a>
        </div>
    </div>
 
    <!-- container div -->
    <div class="container">
 
        <!-- upper button section to select
             the login or signup form -->
        <div class="slider"></div>
        <div class="btn">
            <button class="login">Login</button>
            <button class="signup">Signup</button>
        </div>
 
        <!-- Form section that contains the
             login and the signup form -->
        <div class="form-section">
 
            <!-- login form -->
            <div class="login-box">
                <input type="email"
                       class="email ele"
                       placeholder="youremail@email.com" required>
                <input type="password"
                       class="password ele"
                       placeholder="password" required>
                <button class="clkbtn">Login</button>
            </div>
 
            <!-- signup form -->
            <div class="signup-box">
                <input type="text"
                       class="name ele"
                       placeholder="Enter your name" required>
                <input type="email"
                       class="email ele"
                       placeholder="youremail@email.com" required>
                <input type="password"
                       class="password ele"
                       placeholder="password" required>
                <input type="password"
                       class="password ele"
                       placeholder="Confirm password" required>
                <button class="clkbtn">Signup</button>
            </div>
        </div>
    </div>
        <script>
            
let signup = document.querySelector(".signup");
let login = document.querySelector(".login");
let slider = document.querySelector(".slider");
let formSection = document.querySelector(".form-section");
 
signup.addEventListener("click", () => {
    slider.classList.add("moveslider");
    formSection.classList.add("form-section-move");
});
 
login.addEventListener("click", () => {
    slider.classList.remove("moveslider");
    formSection.classList.remove("form-section-move");
});
        </script>
        <script src="https://kit.fontawesome.com/2d559aadf4.js" crossorigin="anonymous"></script>
    </body>
    </html>
